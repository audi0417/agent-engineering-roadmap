<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent Memory Governance</title>
  <desc id="desc">Flow from candidate memory through classification, redaction, write or reject, review, decay, and deletion.</desc>
  <rect width="1120" height="520" fill="#f8fafc"/>
  <text x="48" y="64" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#102033">Agent Memory Governance</text>
  <text x="48" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5c6b7a">Memory is a governed data system, not just a vector store.</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="48" y="160" width="170" height="88" rx="8" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="78" y="202" fill="#0f172a">Candidate</text>
    <text x="78" y="224" fill="#0f172a">memory</text>
    <rect x="282" y="160" width="170" height="88" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="316" y="202" fill="#0f172a">Classify</text>
    <text x="316" y="224" fill="#0f172a">sensitivity</text>
    <rect x="516" y="160" width="170" height="88" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="550" y="202" fill="#0f172a">Redact PII</text>
    <text x="550" y="224" fill="#0f172a">and secrets</text>
    <rect x="750" y="160" width="170" height="88" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="786" y="202" fill="#0f172a">Write, merge,</text>
    <text x="786" y="224" fill="#0f172a">or reject</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M218 204h64"/>
    <path d="M452 204h64"/>
    <path d="M686 204h64"/>
    <path d="M835 248v66"/>
    <path d="M835 402H286"/>
    <path d="M286 402V248"/>
  </g>
  <g font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="750" y="314" width="170" height="88" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="786" y="356" fill="#0f172a">Review, decay,</text>
    <text x="786" y="378" fill="#0f172a">or delete</text>
    <rect x="282" y="314" width="170" height="88" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="320" y="356" fill="#0f172a">Audit log</text>
    <text x="320" y="378" fill="#0f172a">and owner</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>

