<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent Incident Response</title>
  <desc id="desc">Agent incident response sequence from detection through containment, trace review, hotfix, eval, and postmortem.</desc>
  <rect width="1120" height="520" fill="#f8fafc"/>
  <text x="48" y="64" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#102033">Agent Incident Response</text>
  <text x="48" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5c6b7a">Respond with traces, containment, evals, and postmortems.</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="54" y="190" width="140" height="84" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="90" y="238" fill="#0f172a">Detect</text>
    <rect x="238" y="190" width="140" height="84" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="274" y="238" fill="#0f172a">Contain</text>
    <rect x="422" y="190" width="140" height="84" rx="8" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="454" y="228" fill="#0f172a">Inspect</text>
    <text x="460" y="250" fill="#0f172a">trace</text>
    <rect x="606" y="190" width="140" height="84" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="642" y="228" fill="#0f172a">Hotfix</text>
    <text x="656" y="250" fill="#0f172a">eval</text>
    <rect x="790" y="190" width="140" height="84" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="826" y="228" fill="#0f172a">Release</text>
    <text x="826" y="250" fill="#0f172a">safely</text>
    <rect x="474" y="348" width="206" height="78" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="526" y="392" fill="#0f172a">Postmortem</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M194 232h44"/>
    <path d="M378 232h44"/>
    <path d="M562 232h44"/>
    <path d="M746 232h44"/>
    <path d="M860 274c0 100-180 112-180 112"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>

