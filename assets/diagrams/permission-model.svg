<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Agent Identity And Permission Model</title>
  <desc id="desc">Diagram showing agent identity, scopes, authorization, approval, audit, and tools.</desc>
  <rect width="1120" height="520" fill="#f8fafc"/>
  <text x="48" y="64" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#102033">Agent Identity And Permission Model</text>
  <text x="48" y="96" font-family="Inter, Arial, sans-serif" font-size="16" fill="#5c6b7a">Agents need owners, scopes, reviews, and audit trails.</text>
  <g font-family="Inter, Arial, sans-serif" font-size="15" font-weight="700">
    <rect x="64" y="184" width="180" height="96" rx="8" fill="#e0f2fe" stroke="#0ea5e9"/>
    <text x="104" y="226" fill="#0f172a">Agent identity</text>
    <text x="104" y="250" fill="#0f172a">owner + tier</text>
    <rect x="322" y="184" width="180" height="96" rx="8" fill="#dcfce7" stroke="#16a34a"/>
    <text x="374" y="226" fill="#0f172a">Scopes</text>
    <text x="358" y="250" fill="#0f172a">least privilege</text>
    <rect x="580" y="184" width="180" height="96" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="622" y="226" fill="#0f172a">Authorization</text>
    <text x="638" y="250" fill="#0f172a">decision</text>
    <rect x="838" y="124" width="180" height="96" rx="8" fill="#ede9fe" stroke="#7c3aed"/>
    <text x="890" y="166" fill="#0f172a">Allowed</text>
    <text x="890" y="190" fill="#0f172a">tool call</text>
    <rect x="838" y="296" width="180" height="96" rx="8" fill="#fee2e2" stroke="#ef4444"/>
    <text x="890" y="338" fill="#0f172a">Denied or</text>
    <text x="878" y="362" fill="#0f172a">needs review</text>
    <rect x="444" y="360" width="230" height="78" rx="8" fill="#ffffff" stroke="#94a3b8"/>
    <text x="510" y="404" fill="#0f172a">Audit log</text>
  </g>
  <g stroke="#64748b" stroke-width="3" fill="none" marker-end="url(#arrow)">
    <path d="M244 232h78"/>
    <path d="M502 232h78"/>
    <path d="M760 222l78-36"/>
    <path d="M760 250l78 70"/>
    <path d="M670 280v80"/>
  </g>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
</svg>

